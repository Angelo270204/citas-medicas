version: '3.8'

services:
  # Servicio de Base de Datos MySQL
  mysql:
    image: mysql:8.0
    container_name: citas-medicas-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: citas_medicas
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      # Persistir datos de la BD (¡IMPORTANTE! Los datos no se pierden al reiniciar)
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servicio de la Aplicación Spring Boot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citas-medicas-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Variables de entorno para la aplicación
      DB_URL: jdbc:mysql://mysql:3306/citas_medicas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET: ${SECRET}
    ports:
      - "8080:8080"
    networks:
      - app-network

# Volúmenes para persistencia de datos
volumes:
  mysql_data:
    driver: local

# Red para comunicación entre contenedores
networks:
  app-network:
    driver: bridge
