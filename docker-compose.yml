version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: citas-medicas-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: citas_medicas
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citas-medicas-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://mysql:3306/citas_medicas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
