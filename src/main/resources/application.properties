spring.application.name=citas-medicas

# Perfil activo (dev por defecto, prod en servidor)
spring.profiles.active=${SPRING_PROFILE:dev}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate

api.jwt.secret=${SECRET}

# Configuracion de logging
# En desarrollo (dev): DEBUG para nuestra app
# En produccion (prod): INFO para nuestra app, solo errores de frameworks
# Los niveles especificos estan configurados en logback-spring.xml